<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChainRings Visualizer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <aside id="controls">
      <h1>ChainRings</h1>

      <label for="teeth1">Ring 1 teeth</label>
      <input type="number" id="teeth1" value="44" min="3" max="200" step="1">

      <label for="teeth2">Ring 2 teeth</label>
      <input type="number" id="teeth2" value="22" min="3" max="200" step="1">

      <label for="center_distance">Center distance (mm)</label>
      <input type="number" id="center_distance" value="300" min="1" step="1">

      <label for="pitch">Chain pitch (mm)</label>
      <input type="number" id="pitch" value="12.7" min="0.1" step="0.1">

      <button id="calculate-btn">Calculate</button>

      <div id="error-msg" class="error hidden"></div>

      <div id="stats" class="hidden">
        <h2>Results</h2>
        <p>Chain length<br><strong id="stat-length"></strong> mm</p>
        <p>Number of links<br><strong id="stat-links"></strong></p>
        <p>Ring 1 wrap<br><strong id="stat-wrap1"></strong>°</p>
        <p>Ring 2 wrap<br><strong id="stat-wrap2"></strong>°</p>
      </div>
    </aside>

    <main id="canvas-container">
      <canvas id="chain-canvas"></canvas>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
